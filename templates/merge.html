<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PDF Merge Tool</title>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/merge.css') }}">
</head>

<body>

<div class="container">

    <h2>📄 PDF Merge Tool</h2>

    <!-- 파일 선택 -->
    <div class="file-bar">

        <input type="file" id="pdfFiles" multiple>

        <div class="file-actions">

            <button type="button"
                    onclick="deleteSelected()">
                🗑
            </button>

            <button type="button"
                    onclick="moveUpSelected()">
                ▲
            </button>

            <button type="button"
                    onclick="moveDownSelected()">
                ▼
            </button>

        </div>

    </div>

    <!-- 파일 리스트 -->
    <div id="fileList"></div>

    <!-- 병합 버튼 -->
    <button id="mergeBtn"
            onclick="mergeFiles()">

        📎 PDF 병합 시작

    </button>

    <!-- 로딩 -->
    <div id="loading">

        ⏳ 처리 중...

    </div>

    <!-- 홈 버튼 -->
    <a class="home-btn"
       href="/">

        ⬅ 홈으로

    </a>

</div>

<script src="/static/js/merge.js"></script>

</body>
</html>
